<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loom • Attributes</title>
    <style>
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; }
      /* Portal target for tooltips lives outside the app. */
      #tooltip-root { position: fixed; inset: 0; pointer-events: none; z-index: 50; }
      .bubble { position: fixed; background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 4px 8px; border-radius: 6px; font-size: 12px; box-shadow: 0 4px 12px rgba(0,0,0,.4); }
      .tooltip { text-decoration: underline dotted; cursor: help; }
    </style>
  </head>
  <body>
    <attrs-demo></attrs-demo>
    <div id="tooltip-root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
