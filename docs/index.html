<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loom — Decorator-Driven Web Components</title>
    <meta
      name="description"
      content="Documentation for @toyz/loom — a decorator-driven web component framework with reactive state, DOM morphing, DI, and JSX."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <docs-app>
      <template shadowrootmode="open">
        <style>
          /* ── DSD Shell — minimal inline styles for pre-paint ── */
          :host {
            display: flex;
            min-height: 100vh;
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          }
          aside {
            position: fixed;
            top: 0; left: 0; bottom: 0;
            width: 280px;
            background: var(--bg-surface, #121218);
            border-right: 1px solid var(--border-subtle, #1e1e2a);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 100;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.06) transparent;
          }
          .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 32px 28px 28px;
          }
          .brand-mark {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent, #818cf8), var(--rose, #f472b6));
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(129, 140, 248, 0.25);
          }
          .brand-mark svg {
            width: 20px; height: 20px;
            fill: none;
            stroke: #fff;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
          }
          .brand h1 {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            color: var(--text-primary, #e8e8f0);
            margin: 0;
          }
          .brand-version {
            margin-left: auto;
            font-size: 0.625rem;
            font-family: var(--font-mono, "JetBrains Mono", monospace);
            color: var(--text-muted, #5e5e74);
            border: 1px solid var(--border-subtle, #1e1e2a);
            padding: 2px 8px;
            border-radius: 5px;
            white-space: nowrap;
          }
          .search-trigger {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 16px 8px;
            padding: 8px 12px;
            border: 1px solid var(--border-subtle, #1e1e2a);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.02);
            cursor: pointer;
          }
          .search-trigger-text {
            flex: 1;
            font-size: 0.8rem;
            color: var(--text-muted, #5e5e74);
          }
          .search-trigger-kbd {
            font-size: 0.6rem;
            font-family: var(--font-mono, "JetBrains Mono", monospace);
            color: var(--text-muted, #5e5e74);
            border: 1px solid var(--border-subtle, #1e1e2a);
            padding: 2px 5px;
            border-radius: 4px;
            opacity: 0.7;
          }
          .search-icon {
            flex-shrink: 0;
            width: 15px; height: 15px;
            fill: none;
            stroke: var(--text-muted, #5e5e74);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
          }
          nav { flex: 1; padding: 12px 0 40px; }
          .section { margin-top: 12px; }
          .section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 28px 8px;
            cursor: pointer;
            user-select: none;
          }
          .section-title {
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted, #5e5e74);
          }
          .section-chevron {
            width: 14px; height: 14px;
            fill: none;
            stroke: var(--text-muted, #5e5e74);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
          }
          .section-links {
            overflow: hidden;
            max-height: 0;
            padding: 0 12px;
          }
          main {
            margin-left: 280px;
            flex: 1;
            min-height: 100vh;
          }
          .page {
            max-width: 820px;
            margin: 0 auto;
            padding: 56px 48px 80px;
          }
          /* ── Loading skeleton pulse ── */
          .skeleton {
            height: 14px;
            background: var(--bg-raised, #1a1a24);
            border-radius: 4px;
            animation: pulse 1.5s ease-in-out infinite;
          }
          .skeleton-lg { height: 32px; width: 260px; margin-bottom: 12px; }
          .skeleton-md { height: 14px; width: 200px; margin-bottom: 16px; }
          .skeleton-block { height: 120px; width: 100%; margin-bottom: 20px; border-radius: 8px; }
          @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
          }
          /* ── Mobile ── */
          .mobile-header { display: none; }
          .hamburger { display: none; }
          .sidebar-close { display: none; }
          .backdrop { display: none; }
          @media (max-width: 768px) {
            .mobile-header {
              display: flex;
              position: fixed;
              top: 0; left: 0; right: 0;
              z-index: 150;
              height: 56px;
              background: var(--bg-surface, #121218);
              border-bottom: 1px solid var(--border-subtle, #1e1e2a);
              align-items: center;
              padding: 0 16px;
              gap: 12px;
            }
            .mobile-header .brand-mark { width: 30px; height: 30px; border-radius: 8px; }
            .mobile-header .brand-mark svg { width: 16px; height: 16px; }
            .mobile-header h1 {
              font-size: 1.1rem; font-weight: 700;
              letter-spacing: -0.02em;
              color: var(--text-primary, #e8e8f0);
              margin: 0; flex: 1;
            }
            aside { transform: translateX(-100%); }
            main { margin-left: 0; padding-top: 56px; }
            .page { padding: 24px 20px 60px; }
          }
          @media (min-width: 769px) and (max-width: 1024px) {
            aside { width: 240px; }
            main { margin-left: 240px; }
            .page { padding: 48px 32px 60px; }
          }
        </style>

        <div>
          <!-- Mobile header -->
          <header class="mobile-header">
            <div class="brand-mark">
              <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            </div>
            <h1>Loom</h1>
          </header>
          <div class="backdrop"></div>

          <!-- Sidebar -->
          <aside>
            <div class="brand">
              <div class="brand-mark">
                <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
              </div>
              <h1>Loom</h1>
              <span class="brand-version">v0.17.5</span>
            </div>

            <button class="search-trigger">
              <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
              <span class="search-trigger-text">Search...</span>
              <span class="search-trigger-kbd">⌘K</span>
            </button>

            <nav>
              <div class="section"><div class="section-header"><svg class="section-chevron" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg><span class="section-title">Guides</span></div><div class="section-links"></div></div>
              <div class="section"><div class="section-header"><svg class="section-chevron" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg><span class="section-title">Element</span></div><div class="section-links"></div></div>
              <div class="section"><div class="section-header"><svg class="section-chevron" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg><span class="section-title">Decorators</span></div><div class="section-links"></div></div>
              <div class="section"><div class="section-header"><svg class="section-chevron" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg><span class="section-title">Store</span></div><div class="section-links"></div></div>
              <div class="section"><div class="section-header"><svg class="section-chevron" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg><span class="section-title">Router</span></div><div class="section-links"></div></div>
              <div class="section"><div class="section-header"><svg class="section-chevron" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg><span class="section-title">DI & Services</span></div><div class="section-links"></div></div>
              <div class="section"><div class="section-header"><svg class="section-chevron" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg><span class="section-title">Packages</span></div><div class="section-links"></div></div>
              <div class="section"><div class="section-header"><svg class="section-chevron" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg><span class="section-title">Examples</span></div><div class="section-links"></div></div>
            </nav>
          </aside>

          <!-- Main content — loading skeleton -->
          <main>
            <div class="page">
              <div class="skeleton skeleton-lg"></div>
              <div class="skeleton skeleton-md"></div>
              <div class="skeleton skeleton-block"></div>
              <div class="skeleton skeleton-block"></div>
            </div>
          </main>
        </div>
      </template>
    </docs-app>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
